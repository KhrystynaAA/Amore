<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Панель керування меню</title>
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
   <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

<script>
  // Цей код активує вікно пароля, якщо в посиланні є invite_token
  window.netlifyIdentity.on('init', user => {
    if (!user) {
      window.netlifyIdentity.on('login', () => {
        document.location.href = '/admin/';
      });
    }
  });

  // Додаткова перевірка для посилань активації
  if (window.location.hash.includes('invite_token')) {
    window.netlifyIdentity.on('init', () => {
      window.netlifyIdentity.open('recovery'); // Відкриває вікно встановлення пароля
    });
  }
</script>
  </body>
</html>
